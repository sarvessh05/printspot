<span class="text-zinc-500 font-label text-sm uppercase tracking-[0.1em] hover:text-cyan-300 transition-colors cursor-pointer">Security</span>
</div>
<button class="liquid-pulse">

</button>
</div>

<div class="space-y-2">
<span class="label-sm uppercase tracking-[0.2em] text-primary/60 font-bold">Kiosk Terminal 08-B</span>
<h2 class="text-5xl md:text-7xl font-extrabold tracking-tighter font-headline text-on-surface leading-none">
                        Secure<br/><span class="text-primary drop-shadow-sm">Access</span>
</h2>
</div>
<!-- Live Status Card -->

</div>
</div>

<button class="flex items-center justify-center text-zinc-600 p-4 hover:text-cyan-300 transition-all duration-300">
